services:
  - type: web
    name: ardor-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: ./google_credentials.json
      - key: GMAIL_CREDENTIALS_FILE
        value: ./gmail_credentials.json
      - key: GMAIL_TOKEN_FILE
        value: ./gmail_token.json
      - key: GMAIL_USER
        value: ardor.news@gmail.com
      - key: PIPELINE_HOUR
        value: "7"
      - key: PIPELINE_MINUTE
        value: "0"
      - key: APP_ENV
        value: production
